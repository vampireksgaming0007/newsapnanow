<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Apna Now</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#000;
    overflow:hidden;
    color:#fff;
    height:100vh;
}

/* Canvas Background */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* Center Content */
.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

/* Main Title */
h1{
    font-size:64px;
    letter-spacing:8px;
    text-transform:uppercase;
    opacity:0;
    animation:fadeUp 2s ease forwards;
    animation-delay:1s;
    text-shadow:
        0 0 10px #fff,
        0 0 20px #fff,
        0 0 40px #fff;
}

/* Your Name */
h2{
    margin-top:20px;
    font-weight:300;
    letter-spacing:4px;
    opacity:0;
    animation:fadeUp 2s ease forwards;
    animation-delay:2.5s;
}

/* Animated Red Line */
.line{
    width:150px;
    height:3px;
    background:#222;
    margin:20px auto;
    position:relative;
    overflow:hidden;
}

.line::before{
    content:"";
    position:absolute;
    width:50px;
    height:3px;
    background:red;
    animation:slide 2s infinite alternate ease-in-out;
}

@keyframes slide{
    from{ left:0; }
    to{ left:100px; }
}

/* Button */
button{
    margin-top:40px;
    padding:14px 40px;
    border:none;
    border-radius:40px;
    background:#fff;
    color:#000;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    opacity:0;
    animation:fadeUp 2s ease forwards;
    animation-delay:4s;
}

button:hover{
    background:#000;
    color:#fff;
    border:1px solid #fff;
    transform:scale(1.08);
}

/* Fade Animation */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">
    <h1>NEWS APNA NOW</h1>
    <h2>Khushkaran Singh Sekhon</h2>
    <div class="line"></div>
    <button onclick="goToBlog()">ENTER WEBSITE</button>
</div>

<script>
/* Redirect */
function goToBlog(){
    window.location.href="https://apnanewsnow.blogspot.com";
}

/* Auto redirect after 8 seconds */
setTimeout(()=>{
    window.location.href="https://apnanewsnow.blogspot.com";
},8000);

/* Advanced Starfield Animation */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let starCount = 200;

class Star{
    constructor(){
        this.reset();
    }

    reset(){
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2;
        this.speed = Math.random() * 0.5 + 0.2;
    }

    update(){
        this.y -= this.speed;
        if(this.y < 0){
            this.reset();
            this.y = canvas.height;
        }
    }

    draw(){
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

for(let i=0;i<starCount;i++){
    stars.push(new Star());
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(star=>{
        star.update();
        star.draw();
    });
    requestAnimationFrame(animate);
}

animate();

/* Responsive */
window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
